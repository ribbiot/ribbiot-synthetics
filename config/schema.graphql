# To use @shareable directive, we need to conform to Federation Specification v2.x:
# https://www.apollographql.com/docs/graphos/reference/federation/directives
extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3"
    import: ["@key", "@shareable", "@requires", "@external"]
  )

directive @oneOf on INPUT_OBJECT

scalar Date
scalar DateTime
scalar JSON
scalar JSONLogic

type Query {
  timecardSystemCheck(input: SystemCheckInput): GqlTimecardSystemCheck!
  formTemplate(id: ID!): GqlFormTemplate
  formTemplates(
    accountId: ID!
    filters: ListFormTemplatesInput
  ): [GqlFormTemplate]
  formSubmission(id: ID!): GqlFormSubmission
  formSubmissions(
    filters: ListFormSubmissionsInput!
  ): GqlFormSubmissionsResponse
  formSubmissionsForInvoice(
    filters: ListFormSubmissionsForInvoiceInput!
  ): GqlFormSubmissionsResponse
  userFormSubmissions(
    filters: UserFormSubmissionsInput!
  ): GqlFormSubmissionsResponse
  formPDFConfig(formId: ID!): GqlFormPDFConfig
  formType(slug: String!): GqlFormType
  formTypes: [GqlFormType!]!
  formTypeAccount(formTypeSlug: String!, accountId: ID!): GqlFormTypeAccount
  formTypeAccounts(accountId: ID!): [GqlFormTypeAccount!]!
  """
  Form Template Home Page
  - If accountId is provided and user it's RIBBIOT_ADMIN, it will return the quick links and template type order for the inputted account
  - If accountId is not provided, it will return the quick links and template type order for the current user's account that is the one in the JWT
  """
  formTemplateHomePage(accountId: ID): GqlFormTemplateHomePage!
  formTemplateNotificationConfig(
    formTemplateId: ID!
  ): GqlFormTemplateNotificationConfig
}

type Mutation {
  createFormTemplate(input: GqlFormTemplateInput!): GqlFormTemplateResponse
  updateFormTemplate(
    id: ID!
    input: GqlUpdateFormTemplateInput!
  ): GqlFormTemplateResponse
  deleteFormTemplate(id: ID!): GqlFormTemplateResponse
  createFormSubmission(
    input: GqlCreateFormSubmissionInput!
  ): GqlFormSubmissionResponse
  updateFormSubmission(
    id: ID!
    input: GqlUpdateFormSubmissionInput!
  ): GqlFormSubmissionResponse
  createFormPDFConfig(input: GqlFormPDFConfigInput!): GqlFormPDFConfigResponse
  createFormType(input: CreateFormTypeInput!): GqlFormType!
  updateFormType(slug: String!, input: UpdateFormTypeInput!): GqlFormType!
  deleteFormType(slug: String!): Boolean!
  createFormTypeAccount(input: CreateFormTypeAccountInput!): GqlFormTypeAccount!
  updateFormTypeAccount(
    slug: String!
    accountId: String!
    input: UpdateFormTypeAccountInput!
  ): GqlFormTypeAccount!
  deleteFormTypeAccount(slug: String!, accountId: String!): Boolean!
  deleteFormSubmission(id: ID!): Boolean!
  createFormTemplateQuickLink(
    input: GqlFormTemplateQuickLinkInput!
  ): GqlFormTemplateQuickLink!
  updateFormTemplateQuickLink(
    input: GqlFormTemplateQuickLinkInput!
  ): GqlFormTemplateQuickLink!
  # This method allows clients to send a batch of CREATE/UPDATE/DELETE operations
  batchOperationsFormTemplateQuickLink(
    input: [GqlFormTemplateQuickLinkBatchInput!]!
  ): [GqlFormTemplateQuickLink]!
  deleteFormTemplateQuickLink(input: GqlFormTemplateQuickLinkInput!): Boolean!
  createInvoice(input: GqlCreateInvoiceInput!): GqlFormSubmissionResponse
  updateInvoice(input: GqlUpdateInvoiceInput!): GqlFormSubmissionResponse
  formSubmissionsExport(
    formSubmissionId: ID!
    fileType: FormSubmissionExportFileType!
    formSubmissionSearchFilter: FormSubmissionSearchFilterInput!
  ): String!
  createFormTemplateNotificationConfig(
    input: GqlFormTemplateNotificationConfigInput!
  ): GqlFormTemplateNotificationConfigResponse!
  updateFormTemplateNotificationConfig(
    input: GqlFormTemplateNotificationConfigInput!
  ): GqlFormTemplateNotificationConfigResponse!
}

