input PageInfoInput {
  limit: Int
  nextPageKey: String
}

type PageInfo @shareable {
  limit: Int
  nextPageKey: String
  hasNextPage: Boolean!
  totalCount: Int
}

type GqlFormSubmissionsResponse {
  items: [GqlFormSubmission!]!
  pageInfo: PageInfo
}

input SystemCheckInput {
  checkLaunchDarkly: Boolean = false
  checkSQL: Boolean = false
}

type GqlFormTemplateNotificationConfig {
  formTemplateId: ID!
  emails: [String!]!
  templateId: String!
}

type GqlFormTemplateNotificationConfigResponse {
  code: Int!
  success: Boolean!
  message: String!
  formTemplateNotificationConfig: GqlFormTemplateNotificationConfig
}

input GqlFormTemplateNotificationConfigInput {
  formTemplateId: ID!
  emails: [String!]!
  templateId: String!
}