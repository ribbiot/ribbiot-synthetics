scalar Date
scalar DateTime
scalar JSON

type Query {
  userSystemCheck(input: SystemCheckInput): GqlUserSystemCheck!
  jobSystemCheck(input: SystemCheckInput): GqlJobSystemCheck!
}

type GqlUserSystemCheck {
  message: String!
  environment: JSON!
  featureFlags: JSON
  launchDarklyStatus: String
  sqlStatus: String
  minimumAndroidVersion: String
  minimumIOSVersion: String
}

type GqlJobSystemCheck {
  message: String!
  environment: JSON!
  featureFlags: JSON
  launchDarklyStatus: String
  sqlStatus: String
}

input SystemCheckInput {
  checkLaunchDarkly: Boolean = false
  checkSQL: Boolean = false
}