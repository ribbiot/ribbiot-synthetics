# GraphQL synthetic data for Asset inventory service — DEV only.
# Schema: docs/synthetic-test-config-schema.md
# Data and config here are for dev; prod uses graphql/prod/asset-service.yaml.

scope: graphql
environment: dev
service: Asset inventory service
graph: Dev-AssetService
terraform_file: environments/dev/graphql_asset_service.tf

queries:
  - name: assetSystemCheck
    synthetic_data: []
    notes: No extra data.
    implemented: true
    locations:
      - aws:ca-central-1
      - gcp:us-south1
      - gcp:us-west2
      - aws:us-west-1
      - aws:us-east-1
      - aws:us-east-2
      - aws:us-west-2
      - gcp:us-west1
      - aws:sa-east-1
      - azure:eastus
      - gcp:us-east4
    assertions:
      - jsonpath: "$.data.assetSystemCheck.message"
        operator: is
        targetvalue: "Asset Service is Running!"
      - jsonpath: "$.data.assetSystemCheck.launchDarklyStatus"
        operator: is
        targetvalue: "OK"
      - jsonpath: "$.data.assetSystemCheck.sqlStatus"
        operator: is
        targetvalue: "OK"

  - name: getAssetImportUploadPresignedUrl
    synthetic_data:
      - key: DEV_ASSET_ACCOUNT_ID
        value: "dfb43473-e136-4ede-971f-3238b18d1f8b"
        purpose: Account ID for presigned upload URL
        where_to_set: Terraform global DEV_ASSET_ACCOUNT_ID
        format: ID
    notes: Test only enabled in aws:ca-central-1 until accountId is set and tuned.
    implemented: true
    locations:
      - aws:ca-central-1
      - gcp:us-south1
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
      - aws:sa-east-1
      - azure:eastus
      - gcp:us-east4

  - name: listMeasureUnits
    synthetic_data: []
    notes: Validates list of measure units (name, symbol, type, measureGroup). No request variables.
    implemented: true
    locations:
      - aws:ca-central-1
      - gcp:us-south1
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
      - aws:sa-east-1
      - azure:eastus
      - gcp:us-east4
    assertions:
      - jsonpath: "$.data.listMeasureUnits[0].name"
        operator: is
        targetvalue: "Litre"
      - jsonpath: "$.data.listMeasureUnits[0].symbol"
        operator: is
        targetvalue: "litre"
      - jsonpath: "$.data.listMeasureUnits[0].type"
        operator: is
        targetvalue: "VOLUME"
      - jsonpath: "$.data.listMeasureUnits[0].measureGroup"
        operator: is
        targetvalue: "METRIC"

  - name: assetTemplates
    synthetic_data: []
    implemented: true
    locations:
      - aws:ca-central-1
      - gcp:us-south1
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
      - aws:sa-east-1
      - azure:eastus
      - gcp:us-east4

  - name: baseAssetTemplates
    synthetic_data: []
    implemented: true
    locations:
      - aws:ca-central-1
      - gcp:us-south1
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
      - aws:sa-east-1
      - azure:eastus
      - gcp:us-east4

  - name: assets
    synthetic_data: []
    implemented: true
    locations:
      - aws:ca-central-1
      - gcp:us-south1
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
      - aws:sa-east-1
      - azure:eastus
      - gcp:us-east4

  - name: assetTemplate
    synthetic_data:
      - key: DEV_ASSET_TEMPLATE_ID
        purpose: Asset template ID for assetTemplate(id) query
        where_to_set: TBD (e.g. Terraform var + global variable)
        format: ID
    implemented: false

  - name: baseAssetTemplate
    synthetic_data:
      - key: DEV_BASE_ASSET_TEMPLATE_ID
        purpose: Base asset template ID for baseAssetTemplate(id) query
        where_to_set: TBD
        format: ID
    implemented: false

  - name: asset
    synthetic_data:
      - key: DEV_ASSET_ID
        value: "62a755ac-b741-47da-82bd-b93103f3c2e6"
        purpose: Asset ID for asset(id) query
        where_to_set: Terraform var (e.g. dev_asset_id) → Datadog global DEV_ASSET_ID
        format: ID
    implemented: false

  - name: getAvailableAssetSchedule
    synthetic_data:
      - key: "(input)"
        purpose: startDate (Date!), optional endDate, timezone, searchTerm, assetType, divisionId, branchId, etc.
        where_to_set: TBD (e.g. config or vars per run)
        format: AvailableAssetScheduleInput
    implemented: false

  - name: getAvailableAssetScheduleForTask
    synthetic_data:
      - key: "(input)"
        purpose: startDate (Date!), optional task/context fields
        where_to_set: TBD
        format: AvailableAssetScheduleForTaskInput
    implemented: false

  - name: scheduledAssetsForJobs
    synthetic_data:
      - key: "(input)"
        purpose: jobInputs array with after, before (DateTime!), optional complexJobId
        where_to_set: TBD
        format: ScheduledAssetsForJobsInput
    implemented: false

  - name: scheduledAssetsForTasks
    synthetic_data:
      - key: DEV_SCHEDULED_ASSETS_TASK_IDS
        value: ["4abc50fb-7278-4661-8de5-8db273353d60"]
        purpose: "Task ID(s) for scheduledAssetsForTasks(input: { taskIds: [ID!]! })"
        where_to_set: Terraform var (e.g. dev_scheduled_assets_task_ids) → Datadog global DEV_SCHEDULED_ASSETS_TASK_IDS
        format: JSON array of ID
    notes: >
      Query and response verified with one task ID. Response includes scheduledAssets (asset id, name, category, lat/long, type, imageUrl, lastSeen)
      and overbookedAssets (complexTaskId, asset id/name, complexJob). Backend may return null for complexJob (extensions.valueCompletion warnings).
    implemented: false
