# GraphQL synthetic config for User service (Public) — DEV only.
# Public endpoints: no Auth0; single-step POST to /graphql.
# Schema: docs/synthetic-test-config-schema.md
# User Service Public schema: docs/user-management-service-schema.md (§5)

scope: graphql
environment: dev
service: User service (Public)
graph: Dev-UserService-Public
terraform_file: environments/dev/graphql_user_service_public.tf

queries:
  - name: publicUserServiceSettings
    synthetic_data: []
    notes: Public settings (min app versions). No auth; single-step test.
    locations:
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
    assertions:
      - jsonpath: "$.data.publicUserServiceSettings.minimumAndroidVersion"
        operator: is
        targetvalue: "0.0.2"
      - jsonpath: "$.data.publicUserServiceSettings.minimumIOSVersion"
        operator: is
        targetvalue: "1.1.18"
