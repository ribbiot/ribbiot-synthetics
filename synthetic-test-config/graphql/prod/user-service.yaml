# GraphQL synthetic data for User service — PROD only.
# Schema: docs/synthetic-test-config-schema.md
# User Service schema reference: docs/user-management-service-schema.md

scope: graphql
environment: prod
service: User service
graph: Prod-UserService
terraform_file: environments/prod/graphql_user_service.tf

queries:
  - name: userSystemCheck
    synthetic_data: []
    notes: Health check; optional input checkLaunchDarkly, checkSQL. Update assertions from prod response if values differ.
    locations:
      - aws:us-east-1
      - aws:us-west-2
      - gcp:us-west1
    assertions:
      - jsonpath: "$.data.userSystemCheck.message"
        operator: is
        targetvalue: "User Service is Running!"
      - jsonpath: "$.data.userSystemCheck.launchDarklyStatus"
        operator: is
        targetvalue: "OK"
      - jsonpath: "$.data.userSystemCheck.sqlStatus"
        operator: is
        targetvalue: "OK"
